name: Build Test
on:
  push:
       branches:
             dev
             production
  pull_request:
        branches:
               dev
               prodcution

jobs:
    build:
       runs-on: ubuntu-latest
       steps:
             - name: Checkout code
               uses: actions/checkout@v4

             - name: Set up Node.js
               uses: actions/setup-node@v4
               with:
                     node-version: '20'

             - name: Install dependencies
               run: npm ci

             - name: Build Next.js project
               run: npm run build
        
      
